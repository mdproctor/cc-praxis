---
layout: default
---
<style>
  .post-wrap { max-width: 720px; margin: 0 auto; padding: 3rem 2rem 4rem; }
  .post-back { display: inline-block; font-size: 12px; font-weight: 500; color: #6b7280; text-decoration: none; margin-bottom: 2rem; letter-spacing: 0.03em; }
  .post-back:hover { color: #4f46e5; }
  .post-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .post-date { font-size: 12px; color: #9ca3af; font-weight: 500; }
  .post-type { font-size: 11px; font-weight: 600; color: #4f46e5; background: #eef2ff; padding: 2px 8px; border-radius: 3px; }
  .post-body h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 700; color: #111827; margin-bottom: 1.5rem; line-height: 1.2; letter-spacing: -0.02em; }
  .post-body h2 { font-size: 1.15rem; font-weight: 600; color: #111827; margin-top: 2.5rem; margin-bottom: 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid #e5e7eb; }
  .post-body h3 { font-size: 1rem; font-weight: 600; color: #374151; margin-top: 1.75rem; margin-bottom: 0.5rem; }
  .post-body p { color: #374151; line-height: 1.75; margin-bottom: 1.25rem; }
  .post-body ul, .post-body ol { color: #374151; line-height: 1.75; margin-bottom: 1.25rem; padding-left: 1.5rem; }
  .post-body li { margin-bottom: 0.3rem; }
  .post-body pre { background: #1e1b4b; color: #e5e7eb; border-radius: 6px; padding: 1rem 1.25rem; overflow-x: auto; margin-bottom: 1.25rem; font-size: 13px; line-height: 1.6; }
  .post-body code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.875em; }
  .post-body p code { background: #eef2ff; color: #4338ca; padding: 1px 5px; border-radius: 3px; font-size: 0.875em; }
  .post-body blockquote { border-left: 3px solid #a5b4fc; padding-left: 1rem; margin: 1.5rem 0; color: #6b7280; font-style: italic; }
  .post-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 2rem 0; }
  .post-body strong { color: #111827; font-weight: 600; }
  .post-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.875rem; }
  .post-body th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280; border-bottom: 2px solid #e5e7eb; padding: 0.5rem 0.75rem; text-align: left; }
  .post-body td { border-bottom: 1px solid #f3f4f6; padding: 0.5rem 0.75rem; color: #374151; }
  .post-body img { max-width: 100%; border-radius: 4px; margin: 1rem 0; }
</style>

<div class="post-wrap">
  <a class="post-back" href="{{ '/blog/' | relative_url }}">← All entries</a>
  <div class="post-meta">
    <time class="post-date">{{ page.date | date: "%B %-d, %Y" }}</time>
    {% if page.type %}<span class="post-type">{{ page.type }}</span>{% endif %}
  </div>
  <div class="post-body">
    {{ content }}
  </div>
</div>
